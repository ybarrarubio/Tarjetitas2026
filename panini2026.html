function buildTradeText(forceFull) {
  const mode = forceFull ? 'full' : tradeMode;
  const lines = [];
  const now = new Date().toLocaleDateString('es-MX');
  lines.push('🌍 PANINI WC 2026 — Intercambio');
  lines.push(`📅 ${now}`);
  lines.push('');

  // OFREZCO — all dupes
  const dupeLines = [];
  let dupTotal = 0;
  ALBUM.forEach(s => {
    s.stickers.forEach(stk => {
      const v = state[s.id]?.[stk.code]||0;
      if (v >= 2) {
        const sob = v-1;
        dupeLines.push(`${s.flag||''} ${stk.code} - ${stk.name}${sob>1?` ×${sob}`:''}`);
        dupTotal += sob;
      }
    });
  });
  lines.push(`🔄 OFREZCO (${dupTotal} sobrante${dupTotal!==1?'s':''})`);
  if (dupeLines.length) dupeLines.forEach(l => lines.push(l));
  else lines.push('  (sin duplicados todavia)');
  lines.push('');

  // BUSCO
  if (mode === 'compact') {
    // Top 5 most incomplete teams
    const teamSecs = ALBUM.filter(s => s.group);
    const sorted = teamSecs.map(s => {
      const missing = s.stickers.filter(stk => (state[s.id]?.[stk.code]||0) === 0);
      return {s, missing};
    }).filter(x => x.missing.length > 0)
      .sort((a,b) => b.missing.length - a.missing.length)
      .slice(0, 5);

    const totalMissing = ALBUM.reduce((acc, s) =>
      acc + s.stickers.filter(stk => (state[s.id]?.[stk.code]||0) === 0).length, 0);
    lines.push(`🔍 BUSCO — top 5 equipos con más faltantes (${totalMissing} total)`);
    sorted.forEach(({s, missing}) => {
      lines.push(`${s.flag||''} ${s.name} (${missing.length} faltantes)`);
      missing.forEach(stk => lines.push(`  ${stk.code} - ${stk.name}`));
    });
  } else {
    const totalMissing = ALBUM.reduce((acc, s) =>
      acc + s.stickers.filter(stk => (state[s.id]?.[stk.code]||0) === 0).length, 0);
    lines.push(`🔍 BUSCO (${totalMissing} faltantes)`);
    ALBUM.forEach(s => {
      const missing = s.stickers.filter(stk => (state[s.id]?.[stk.code]||0) === 0);
      if (!missing.length) return;
      lines.push(`${s.flag||''} ${s.name}:`);
      missing.forEach(stk => lines.push(`  ${stk.code} - ${stk.name}`));
    });
  }

  lines.push('');
  lines.push('📲 Generado con Panini WC 2026 Tracker');
  return lines.join('\n');
}

function buildTradeTextFull() {
  const prev = tradeMode;
  tradeMode = 'full';
  const txt = buildTradeText();
  tradeMode = prev;
  return txt;
}

function copyTrade() {
  const text = buildTradeText();
  navigator.clipboard.writeText(text).then(() => {
    const el = document.getElementById('copy-ok');
    if (el) { el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2500); }
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const el = document.getElementById('copy-ok');
    if (el) { el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2500); }
  });
}

// ── SIDEBAR ──
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  if (!sb) return;

  const teamSecs = ALBUM.filter(s => s.group).map(s => {
    const have = secHave(s.id), total = s.stickers.length;
    const pct = total > 0 ? Math.round(have / total * 100) : 0;
    return {s, have, total, pct};
  }).sort((a, b) => b.pct - a.pct || a.s.name.localeCompare(b.s.name));

  let html = '<div class="sidebar-title">Progreso por equipo</div>';
  teamSecs.forEach(({s, have, total, pct}) => {
    const isDone = have === total && total > 0;
    const isEmpty = have === 0;
    const cls = isDone ? 'done' : isEmpty ? 'empty' : '';
    const barColor = isDone ? 'var(--gold)' : pct > 60 ? 'var(--green)' : pct > 30 ? 'var(--amber)' : pct > 0 ? 'var(--red)' : 'var(--bg4)';
    html += `<div class="sidebar-team ${cls}" data-teamid="${s.id}" title="${s.name}: ${have}/${total}">` +
      `<span class="sidebar-flag">${s.flag||''}</span>` +
      `<span class="sidebar-name">${s.name}</span>` +
      `<div class="sidebar-bar-wrap"><div class="sidebar-bar-bg">` +
      `<div class="sidebar-bar-fill" style="width:${pct}%;background:${barColor}"></div>` +
      `</div></div>` +
      `<span class="sidebar-pct">${pct}%</span>` +
      `</div>`;
  });
  sb.innerHTML = html;

  // Single delegated click listener — no inline onclick needed
  sb.onclick = function(e) {
    const row = e.target.closest('[data-teamid]');
    if (row) goToTeam(row.dataset.teamid);
  };
}

function goToTeam(id) {
  // Expand the group and section
  const sec = ALBUM.find(s => s.id === id);
  if (sec?.group) groupCollapsed[sec.group] = false;
  collapsed[id] = false;
  // Switch to album view using the actual tab button
  const tabs = document.querySelectorAll('.tab');
  const albumTab = tabs[0];
  albumTab.click();
  // Scroll after render settles
  setTimeout(() => {
    const el = document.getElementById('sec-' + id);
    if (el) el.scrollIntoView({behavior: 'smooth', block: 'start'});
  }, 150);
}

// ── TRADE CARD HELPERS ──
function buildTradeSection() {
  return '<div class="trade-divider">' +
    '<div class="trade-section-title">🔄 Tarjeta de intercambio</div>' +
    '<div class="trade-mode-row">' +
    '<span class="trade-mode-label">Faltantes:</span>' +
    '<button class="trade-mode-btn ' + (tradeMode==='compact'?'active':'') + '" onclick="tradeMode=\'compact\';updateTradePreview()">Top 5 equipos</button>' +
    '<button class="trade-mode-btn ' + (tradeMode==='full'?'active':'') + '" onclick="tradeMode=\'full\';updateTradePreview()">Todos</button>' +
    '</div>' +
    '<div class="trade-preview" id="trade-preview-box"></div>' +
    '<div class="trade-controls">' +
    '<button class="btn-gold" onclick="copyTrade()">📋 Copiar para WhatsApp</button>' +
    '<span class="copy-success" id="copy-ok">✓ Copiado!</span>' +
    '<button onclick="downloadTxt(buildTradeText(true),\'panini2026_intercambio.txt\')">📄 Descargar .txt completo</button>' +
    '</div></div>';
}

function updateTradePreview() {
  // Refresh mode buttons
  document.querySelectorAll('.trade-mode-btn').forEach(btn => {
    const isCompact = btn.textContent.includes('Top');
    btn.classList.toggle('active', isCompact ? tradeMode==='compact' : tradeMode==='full');
  });
  const box = document.getElementById('trade-preview-box');
  if (box) box.textContent = buildTradeText(false);
}

function showCopyOk() {
  const el = document.getElementById('copy-ok');
  if (!el) return;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function copyTrade() {
  const text = buildTradeText(false);
  const doFallback = () => {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showCopyOk();
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(showCopyOk).catch(doFallback);
  } else { doFallback(); }
}
