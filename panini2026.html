<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Panini WC 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── THEME TOKENS ── */
:root {
  --bg:#0f1117;--bg2:#171b26;--bg3:#1f2435;--bg4:#2a3045;
  --text:#eef0f7;--text2:#b8bccc;--text3:#7a80a0;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.16);
  --gold:#f5c518;--gold-dim:#c49d12;--gold-bg:rgba(245,197,24,0.12);--gold-bd:rgba(245,197,24,0.40);
  --green:#22c97a;--green-bg:rgba(34,201,122,0.12);--green-bd:rgba(34,201,122,0.40);
  --red:#f26060;--red-bg:rgba(242,96,96,0.12);--red-bd:rgba(242,96,96,0.35);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,0.14);--amber-bd:rgba(245,158,11,0.40);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,0.14);--blue-bd:rgba(96,165,250,0.35);
  --purple:#c084fc;--purple-bg:rgba(192,132,252,0.14);--purple-bd:rgba(192,132,252,0.35);
  --radius:8px;--radius-lg:14px;
  --font-display:'Bebas Neue',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
}

[data-theme="light"] {
  --bg:#f0f2f8;--bg2:#ffffff;--bg3:#e8eaf2;--bg4:#dde0ee;
  --text:#0f1117;--text2:#3a3f5c;--text3:#6b7099;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.17);
  --gold:#b8870a;--gold-dim:#9a6f08;--gold-bg:rgba(184,135,10,0.10);--gold-bd:rgba(184,135,10,0.35);
  --green:#0a8f52;--green-bg:rgba(10,143,82,0.10);--green-bd:rgba(10,143,82,0.35);
  --red:#c0392b;--red-bg:rgba(192,57,43,0.10);--red-bd:rgba(192,57,43,0.30);
  --amber:#b45309;--amber-bg:rgba(180,83,9,0.10);--amber-bd:rgba(180,83,9,0.35);
  --blue:#1d6fa5;--blue-bg:rgba(29,111,165,0.10);--blue-bd:rgba(29,111,165,0.30);
  --purple:#7c3aed;--purple-bg:rgba(124,58,237,0.10);--purple-bd:rgba(124,58,237,0.30);
  --shadow:0 4px 24px rgba(0,0,0,0.10);
}

body{
  font-family:var(--font-body);font-size:16px;line-height:1.5;
  background:var(--bg);color:var(--text);min-height:100vh;
  transition:background .2s,color .2s;
}
[data-theme="dark"] body, body{
  background-image:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(245,197,24,0.05) 0%,transparent 60%);
}
[data-theme="light"] body{background-image:none;}

.wrap{max-width:920px;margin:0 auto;padding:20px 18px}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.topbar-title{font-family:var(--font-display);font-size:30px;letter-spacing:.04em;color:var(--gold);display:flex;align-items:center;gap:10px;text-shadow:0 0 30px var(--gold-bg)}
.topbar-title span{color:var(--text)}
.topbar-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* ── THEME TOGGLE ── */
.theme-toggle{width:38px;height:22px;border-radius:99px;border:0.5px solid var(--border2);background:var(--bg3);cursor:pointer;position:relative;padding:0;transition:background .2s;flex-shrink:0}
.theme-toggle::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:var(--gold);transition:transform .2s,background .2s}
[data-theme="light"] .theme-toggle::after{transform:translateX(16px)}
.theme-icon{font-size:13px;line-height:1}

/* ── BUTTONS ── */
button{font-family:var(--font-body);font-size:14px;font-weight:500;padding:8px 16px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .15s}
button:hover{background:var(--bg4);color:var(--text)}
button:active{transform:scale(.97)}
.btn-gold{background:var(--gold-bg);border-color:var(--gold-bd);color:var(--gold)}
.btn-gold:hover{background:var(--gold-bg);filter:brightness(1.1);color:var(--gold)}
input[type=text],select{font-family:var(--font-body);font-size:15px;padding:9px 13px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg3);color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
input[type=text]{width:100%}
input[type=text]:focus,select:focus{border-color:var(--gold-bd);box-shadow:0 0 0 3px var(--gold-bg)}

/* ── METRICS ── */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(125px,1fr));gap:8px;margin-bottom:14px}
.metric{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:13px 14px;position:relative;overflow:hidden;transition:border-color .15s}
.metric:hover{border-color:var(--border2)}
.metric::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),transparent);opacity:0;transition:opacity .2s}
.metric:hover::after{opacity:1}
.mlabel{font-size:12px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
.mval{font-family:var(--font-display);font-size:28px;color:var(--text);letter-spacing:.02em;line-height:1}
.msub{font-size:12px;color:var(--text3);margin-top:4px}

/* ── PROGRESS ── */
.prog-wrap{margin-bottom:22px}
.prog-info{display:flex;justify-content:space-between;margin-bottom:7px}
.prog-pct-label{font-family:var(--font-display);font-size:15px;color:var(--gold);letter-spacing:.04em}
.prog-cnt-label{font-size:13px;color:var(--text3)}
.prog-bg{background:var(--bg3);border-radius:99px;height:7px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold-dim),var(--gold));transition:width .4s cubic-bezier(.4,0,.2,1);box-shadow:0 0 12px var(--gold-bg)}

/* ── TABS ── */
.tabs{display:flex;gap:4px;margin-bottom:18px;border-bottom:0.5px solid var(--border);padding-bottom:10px;flex-wrap:wrap}
.tab{border:0.5px solid transparent;background:none;font-size:14px;font-weight:500;padding:7px 16px;border-radius:var(--radius);color:var(--text3)}
.tab.active{background:var(--gold-bg);border-color:var(--gold-bd);color:var(--gold)}
.tab:hover:not(.active){color:var(--text2);background:var(--bg3)}

/* ── ALBUM ── */
.search-row{display:flex;gap:8px;align-items:center;margin-bottom:14px}
.group-block{margin-bottom:16px}
.group-title{font-family:var(--font-display);font-size:16px;letter-spacing:.08em;color:var(--text2);margin-bottom:0;padding:10px 14px;border:0.5px solid var(--border);border-radius:var(--radius-lg);background:var(--bg2);display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none;transition:background .15s,border-color .15s}
.group-title:hover{background:var(--bg3);border-color:var(--border2)}
.group-title.open{border-bottom-left-radius:0;border-bottom-right-radius:0;border-bottom-color:transparent}
.group-title-text{flex:1}
.group-chev{font-size:11px;color:var(--text3);transition:transform .2s;display:inline-block;margin-left:auto}
.group-chev.open{transform:rotate(180deg)}
.group-badge{background:var(--blue-bg);color:var(--blue);border:0.5px solid var(--blue-bd);font-size:12px;padding:2px 9px;border-radius:99px;font-weight:600}
.group-body{border:0.5px solid var(--border);border-top:none;border-bottom-left-radius:var(--radius-lg);border-bottom-right-radius:var(--radius-lg);overflow:hidden;margin-bottom:8px}

.sec-card{background:var(--bg2);border-bottom:0.5px solid var(--border);overflow:hidden;transition:background .15s}
.sec-card:last-child{border-bottom:none}
.sec-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;transition:background .15s}
.sec-header:hover{background:var(--bg3)}
.sec-name{font-size:15px;font-weight:500;display:flex;align-items:center;gap:8px}
.sec-meta{display:flex;align-items:center;gap:9px}
.badge{font-size:12px;padding:3px 10px;border-radius:99px;font-weight:600;border:0.5px solid transparent}
.b-done{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.b-part{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bd)}
.b-none{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.chev{font-size:11px;color:var(--text3);transition:transform .2s;display:inline-block}
.chev.open{transform:rotate(180deg)}
.sec-body{padding:0 16px 16px;background:var(--bg2)}
.sec-actions{display:flex;gap:7px;margin-bottom:11px;padding-top:12px}
.sec-actions button{font-size:12px;padding:4px 12px}

/* ── SECTION PROGRESS BAR ── */
.sec-prog-wrap{flex:1;margin:0 10px}
.sec-prog-bg{background:var(--bg3);border-radius:99px;height:4px;overflow:hidden}
.sec-prog-fill{height:100%;border-radius:99px;background:var(--green);transition:width .3s}
.sec-card.complete .sec-header{background:linear-gradient(90deg,rgba(245,197,24,0.08),transparent)}
.sec-card.complete .sec-name{color:var(--gold)}
.sec-card.complete .sec-prog-fill{background:var(--gold)}
.sec-card.complete{border-bottom-color:var(--gold-bd)}

/* ── STICKERS ── */
/* ── STICKERS ── */
/* Use div wrapper so we can have a real nested clickable minus — no button-in-button */
.stk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(82px,1fr));gap:6px}
.stk-wrap{position:relative}
.stk{width:100%;border-radius:9px;border:0.5px solid var(--border);background:var(--bg3);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:transform .12s,background .12s,border-color .12s;color:var(--text3);padding:8px 5px;gap:2px;min-height:62px;text-align:center;line-height:1.3;user-select:none}
.stk:hover{transform:scale(1.04);background:var(--bg4)}
.stk.have{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}
.stk.dup{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber)}
.stk-code{font-weight:700;font-size:11px;letter-spacing:.02em}
.stk-name{font-size:12px;font-weight:400;color:inherit;word-break:break-word}
.stk-count{font-size:11px;font-weight:700;margin-top:1px}
.stk-minus{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;border:0.5px solid var(--amber-bd);background:var(--bg2);color:var(--amber);cursor:pointer;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1;transition:background .15s,transform .1s;z-index:2}
.stk-minus:hover{background:var(--amber-bg);transform:scale(1.15)}

/* ── DUPES — big controls ── */
.dup-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--border);font-size:14px;gap:8px}
.dup-item:last-child{border:none}
.dup-l{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.dup-l-text{display:flex;flex-direction:column;gap:2px;min-width:0}
.dup-l-code{font-weight:600;font-size:14px}
.dup-l-name{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dup-r{display:flex;align-items:center;gap:8px;flex-shrink:0}
.dup-counter{display:flex;align-items:center;gap:6px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius);padding:4px 10px}
.dup-count-val{font-family:var(--font-display);font-size:20px;letter-spacing:.02em;color:var(--amber);min-width:28px;text-align:center;line-height:1}
.dup-count-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.dup-btn{font-size:18px;font-weight:700;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .15s;flex-shrink:0;padding:0}
.dup-btn:hover{background:var(--bg4);color:var(--text)}
.dup-btn.dup-plus{border-color:var(--green-bd);color:var(--green);background:var(--green-bg)}
.dup-btn.dup-plus:hover{filter:brightness(1.15)}
.dup-btn.dup-minus{border-color:var(--amber-bd);color:var(--amber);background:var(--amber-bg)}
.dup-btn.dup-minus:hover{filter:brightness(1.15)}

/* ── CALENDAR ── */
.cal-controls{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.tz-label{font-size:13px;color:var(--text3);white-space:nowrap;text-transform:uppercase;letter-spacing:.06em}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.filter-label{font-size:13px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.filter-btn{font-size:12px;padding:5px 13px}
.filter-btn.active{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue)}
.date-group{margin-bottom:22px}
.date-heading{font-family:var(--font-display);font-size:17px;letter-spacing:.06em;color:var(--text2);padding:6px 0;border-bottom:0.5px solid var(--border);margin-bottom:11px;display:flex;align-items:center;gap:10px;text-transform:uppercase}
.date-today-pill{background:var(--gold-bg);color:var(--gold);border:0.5px solid var(--gold-bd);font-size:11px;padding:2px 9px;border-radius:99px;font-weight:600;font-family:var(--font-body);text-transform:uppercase;letter-spacing:.04em}

/* ── MATCH CARD ── */
.match-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:8px;display:grid;grid-template-columns:64px 1fr auto;gap:14px;align-items:center;transition:border-color .15s}
.match-card:hover{border-color:var(--border2)}
.match-card.live{border-color:var(--green-bd);background:linear-gradient(135deg,var(--green-bg),var(--bg2));animation:pulse-border 2s ease-in-out infinite}
.match-card.finished{opacity:.7}
@keyframes pulse-border{0%,100%{box-shadow:0 0 0 0 rgba(34,201,122,0)}50%{box-shadow:0 0 0 3px rgba(34,201,122,0.15)}}

.match-time-col{display:flex;flex-direction:column;align-items:center;gap:4px}
.match-time{font-family:var(--font-display);font-size:15px;letter-spacing:.04em;color:var(--text3);text-align:center}
.match-time.live-indicator{color:var(--green)}
.match-stage-badge{background:var(--blue-bg);color:var(--blue);border:0.5px solid var(--blue-bd);font-size:10px;padding:2px 7px;border-radius:99px;font-weight:600;text-align:center;white-space:nowrap}
.match-stage-badge.knockout{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-bd)}

.match-body{display:flex;flex-direction:column;gap:6px}
.match-team-row{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:500}
.match-team-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);min-width:36px;font-weight:500}
.match-team-name{font-size:15px;font-weight:500;color:var(--text)}
.match-divider{height:0.5px;background:var(--border);margin:2px 0 2px 45px}
.match-venue-row{display:flex;align-items:center;gap:6px;margin-top:2px;flex-wrap:wrap;gap:6px}
.match-venue-link{font-size:12px;color:var(--text3);text-decoration:none;display:flex;align-items:center;gap:4px;transition:color .15s;cursor:pointer;background:none;border:none;padding:0;font-family:var(--font-body)}
.match-venue-link:hover{color:var(--blue)}
.match-stage-label{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600}
.stage-group{background:var(--blue-bg);color:var(--blue);border:0.5px solid var(--blue-bd)}
.stage-knockout{background:var(--purple-bg);color:var(--purple);border:0.5px solid var(--purple-bd)}

/* PREDICTIONS */
.pred-row{display:flex;gap:5px;margin-top:8px}
.pred-btn{flex:1;font-size:12px;padding:7px 4px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg3);color:var(--text3);cursor:pointer;text-align:center;transition:all .15s;line-height:1.4}
.pred-btn:hover{background:var(--bg4);color:var(--text2)}
.pred-btn.pred-home.selected{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue)}
.pred-btn.pred-draw.selected{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber)}
.pred-btn.pred-away.selected{background:var(--purple-bg);border-color:var(--purple-bd);color:var(--purple)}
.pred-pct{font-family:var(--font-display);font-size:16px;letter-spacing:.02em;display:block}
.pred-label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;opacity:.75}
.pred-outcome{font-size:12px;font-weight:600;margin-top:5px;display:flex;align-items:center;gap:5px}
.pred-outcome.correct{color:var(--green)}
.pred-outcome.wrong{color:var(--red)}

/* MATCH RIGHT COL */
.match-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.match-score{display:flex;align-items:center;gap:6px}
.score-box{display:flex;flex-direction:column;gap:4px}
.score-input{width:46px;padding:6px 4px;text-align:center;font-family:var(--font-display);font-size:20px;letter-spacing:.04em;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg3);color:var(--gold);-webkit-appearance:none;-moz-appearance:textfield}
.score-input:focus{border-color:var(--gold-bd);outline:none;box-shadow:0 0 0 3px var(--gold-bg)}
.score-sep{font-family:var(--font-display);font-size:22px;color:var(--text3);line-height:1}
.match-watched{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;flex-shrink:0;padding:6px 12px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--bg3);color:var(--text3);transition:all .15s}
.match-watched:hover{color:var(--text2)}
.match-watched.watched-yes{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}

/* ── GROUPS TABLE ── */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.group-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.group-card-title{font-family:var(--font-display);font-size:18px;letter-spacing:.06em;padding:11px 15px;background:var(--bg3);border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px;color:var(--text)}
.standings-table{width:100%;border-collapse:collapse}
.standings-table th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);padding:7px 8px;text-align:center;border-bottom:0.5px solid var(--border);font-weight:500}
.standings-table th:first-child{text-align:left;padding-left:14px}
.standings-table td{padding:9px 8px;text-align:center;font-size:14px;border-bottom:0.5px solid var(--border)}
.standings-table td:first-child{text-align:left;padding-left:14px;font-weight:500}
.standings-table .team-cell{display:flex;align-items:center;gap:7px}
.standings-table tr:last-child td{border-bottom:none}
.standings-table tr.qualify-1st td{background:rgba(34,201,122,0.07)}
.standings-table tr.qualify-2nd td{background:rgba(34,201,122,0.04)}
.pts-cell{font-family:var(--font-display);font-size:16px;letter-spacing:.03em;color:var(--gold)}
.qual-legend{font-size:12px;color:var(--text3);padding:9px 14px;display:flex;gap:14px;flex-wrap:wrap;border-top:0.5px solid var(--border)}
.qual-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}

/* ── DUPES ── */
.dup-list{padding:0 16px 16px}
.dup-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:14px;gap:8px}
.dup-item:last-child{border:none}
.dup-l{display:flex;align-items:center;gap:8px}
.dup-r{display:flex;align-items:center;gap:7px;flex-shrink:0}

/* ── SOBRES ── */
.info-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:18px}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.warn-box{font-size:14px;color:var(--text2);background:var(--bg3);padding:13px 16px;border-radius:var(--radius);margin-bottom:12px;line-height:1.6;border-left:3px solid var(--gold)}
.info-note{font-size:13px;color:var(--text3)}

/* ── PACK MODAL ── */
#pack-modal{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-box{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-title{font-family:var(--font-display);font-size:22px;letter-spacing:.04em;color:var(--gold);margin-bottom:16px}
.modal-sub{font-size:13px;color:var(--text3);margin-bottom:14px;line-height:1.5}
.pack-type-row{display:flex;gap:7px;margin-bottom:16px}
.pack-type-btn{flex:1;font-size:13px;padding:8px}
.pack-type-btn.active{background:var(--gold-bg);border-color:var(--gold-bd);color:var(--gold)}
.pack-inputs-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.pack-input-wrap{display:flex;flex-direction:column;gap:4px}
.pack-input-label{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.pack-stk-input{font-family:var(--font-body);font-size:15px;padding:9px 12px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg3);color:var(--text);outline:none;width:100%;text-transform:uppercase}
.pack-stk-input:focus{border-color:var(--gold-bd);box-shadow:0 0 0 3px var(--gold-bg)}
.pack-stk-input.valid{border-color:var(--green-bd);color:var(--green)}
.pack-stk-input.dup-found{border-color:var(--amber-bd);color:var(--amber)}
.pack-stk-input.invalid{border-color:var(--red-bd);color:var(--red)}
.pack-preview{background:var(--bg3);border-radius:var(--radius);padding:12px 14px;margin-bottom:16px;font-size:13px;color:var(--text2);line-height:2;min-height:44px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.preview-new{color:var(--green);font-weight:600}
.preview-dup{color:var(--amber);font-weight:600}
.preview-inv{color:var(--red)}

/* ── TEAMS VIEW ── */
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.team-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;transition:border-color .15s,background .15s;cursor:default}
.team-card:hover{border-color:var(--border2);background:var(--bg3)}
.team-card.tc-empty{opacity:.55}
.team-card.tc-complete{border-color:var(--gold-bd);background:linear-gradient(135deg,var(--gold-bg),var(--bg2))}
.team-flag{font-size:32px;line-height:1}
.team-name{font-size:13px;font-weight:500;text-align:center;color:var(--text)}
.team-card.tc-empty .team-name{color:var(--text3)}
.team-card.tc-complete .team-name{color:var(--gold)}
.team-pct{font-family:var(--font-display);font-size:18px;letter-spacing:.03em}
.team-card.tc-empty .team-pct{color:var(--text3)}
.team-card.tc-complete .team-pct{color:var(--gold)}
.team-prog-bg{width:100%;background:var(--bg3);border-radius:99px;height:5px;overflow:hidden}
.team-prog-fill{height:100%;border-radius:99px;transition:width .3s}
.team-group-badge{font-size:10px;padding:1px 7px;border-radius:99px;background:var(--blue-bg);color:var(--blue);border:0.5px solid var(--blue-bd);font-weight:600}
.teams-section-title{font-family:var(--font-display);font-size:15px;letter-spacing:.06em;color:var(--text2);margin:16px 0 8px;padding-bottom:6px;border-bottom:0.5px solid var(--border);text-transform:uppercase}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg3);border:0.5px solid var(--border2);color:var(--text);padding:11px 22px;border-radius:var(--radius);font-size:14px;z-index:200;box-shadow:var(--shadow);white-space:nowrap}

.empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:15px;font-family:var(--font-display);letter-spacing:.06em;text-transform:uppercase}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:99px}

@media(max-width:600px){
  .match-card{grid-template-columns:52px 1fr auto;gap:10px}
  .stk-grid{grid-template-columns:repeat(auto-fill,minmax(68px,1fr))}
  .stk{min-height:54px}
  .groups-grid{grid-template-columns:1fr}
  .pack-inputs-grid{grid-template-columns:1fr}
}

/* ── MATCH ALERT BANNER ── */
#match-banner{display:none;background:linear-gradient(90deg,rgba(34,201,122,0.15),rgba(34,201,122,0.05));border:0.5px solid var(--green-bd);border-radius:var(--radius-lg);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;animation:banner-pulse 3s ease-in-out infinite}
#match-banner.hidden{display:none!important}
@keyframes banner-pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,201,122,0)}50%{box-shadow:0 0 0 4px rgba(34,201,122,0.10)}}
.banner-dot{width:10px;height:10px;border-radius:50%;background:var(--green);flex-shrink:0;animation:dot-blink 1.2s ease-in-out infinite}
@keyframes dot-blink{0%,100%{opacity:1}50%{opacity:.3}}
.banner-text{flex:1;font-size:14px;font-weight:500;color:var(--text)}
.banner-sub{font-size:12px;color:var(--text2);margin-top:2px}
.banner-go{font-size:12px;padding:5px 12px;background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}
.banner-go:hover{filter:brightness(1.1)}
.tab-live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--red);margin-left:5px;vertical-align:middle;animation:dot-blink 1s ease-in-out infinite}

/* ── SOBRES TXT EXPORT ── */
.export-txt-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.export-txt-row button{flex:1;min-width:140px}

/* ── PACK HISTORY ── */
.history-section{margin-top:20px}
.history-title{font-family:var(--font-display);font-size:16px;letter-spacing:.06em;color:var(--text2);margin-bottom:10px;text-transform:uppercase}
.history-empty{font-size:13px;color:var(--text3);padding:12px 0}
.history-list{display:flex;flex-direction:column;gap:6px}
.history-item{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.history-date{font-size:12px;color:var(--text3);min-width:120px;flex-shrink:0}
.history-type{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600;flex-shrink:0}
.history-type.reg{background:var(--blue-bg);color:var(--blue);border:0.5px solid var(--blue-bd)}
.history-type.cc{background:var(--amber-bg);color:var(--amber);border:0.5px solid var(--amber-bd)}
.history-stickers{font-size:12px;color:var(--text2);flex:1;line-height:1.6}
.history-stats{display:flex;gap:8px;flex-shrink:0}
.h-new{font-size:12px;font-weight:600;color:var(--green)}
.h-dup{font-size:12px;font-weight:600;color:var(--amber)}
.history-show-more{font-size:12px;color:var(--text3);cursor:pointer;text-align:center;padding:8px;border:0.5px dashed var(--border2);border-radius:var(--radius);margin-top:4px;transition:background .15s}
.history-show-more:hover{background:var(--bg3);color:var(--text2)}

/* ── BRACKET ── */
.bracket-wrap{overflow-x:auto;padding-bottom:16px}
.bracket{display:flex;gap:0;align-items:flex-start;min-width:900px}
.bracket-round{display:flex;flex-direction:column;flex-shrink:0}
.bracket-round-title{font-family:var(--font-display);font-size:13px;letter-spacing:.06em;color:var(--text3);text-transform:uppercase;text-align:center;padding:8px 12px;border-bottom:0.5px solid var(--border);margin-bottom:8px;white-space:nowrap}
.bracket-slots{display:flex;flex-direction:column;justify-content:space-around;flex:1}
.bracket-match{display:flex;align-items:center;margin:4px 0}
.bracket-pair{display:flex;flex-direction:column;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;width:160px;flex-shrink:0;transition:border-color .15s}
.bracket-pair:hover{border-color:var(--border2)}
.bracket-pair.has-winner{border-color:var(--gold-bd)}
.bracket-team{display:flex;align-items:center;gap:7px;padding:7px 10px;font-size:13px;font-weight:500;border-bottom:0.5px solid var(--border);min-height:34px;transition:background .15s}
.bracket-team:last-child{border-bottom:none}
.bracket-team.winner{background:var(--gold-bg);color:var(--gold)}
.bracket-team.tbd{color:var(--text3);font-size:12px;font-style:italic}
.bracket-flag{font-size:16px;flex-shrink:0;width:20px;text-align:center}
.bracket-name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bracket-score{font-family:var(--font-display);font-size:14px;color:var(--text2);margin-left:4px;flex-shrink:0}
.bracket-connector{width:20px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.bracket-connector::before{content:'';position:absolute;right:0;top:25%;bottom:25%;border-right:0.5px solid var(--border);border-top:0.5px solid var(--border);border-bottom:0.5px solid var(--border);width:10px}
.bracket-final .bracket-pair{width:180px;background:linear-gradient(135deg,var(--gold-bg),var(--bg2))}
.bracket-final .bracket-team{font-size:14px}
.bracket-champion{text-align:center;padding:16px 8px}
.bracket-champion-title{font-family:var(--font-display);font-size:13px;letter-spacing:.08em;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
.bracket-trophy{font-size:36px;margin-bottom:6px}
.bracket-champion-name{font-size:15px;font-weight:600;color:var(--text)}
.bracket-champion-flag{font-size:24px;margin-bottom:4px}
.bracket-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.bracket-tab{font-size:12px;padding:5px 14px}
.bracket-tab.active{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue)}
.group-qual-note{font-size:12px;color:var(--text3);margin-bottom:14px;padding:10px 14px;background:var(--bg2);border-radius:var(--radius);border:0.5px solid var(--border);line-height:1.6}

/* ── TRADE CARD ── */
.trade-section{margin-top:0}
.trade-controls{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.trade-preview{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px;font-family:monospace;font-size:13px;line-height:1.8;white-space:pre-wrap;color:var(--text2);max-height:340px;overflow-y:auto}
.trade-mode-row{display:flex;gap:6px;margin-bottom:12px;align-items:center}
.trade-mode-label{font-size:13px;color:var(--text3)}
.trade-mode-btn{font-size:12px;padding:4px 12px}
.trade-mode-btn.active{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue)}
.copy-success{color:var(--green);font-size:13px;font-weight:600;margin-left:8px;opacity:0;transition:opacity .3s}
.copy-success.show{opacity:1}

.page-layout{display:flex;gap:20px;align-items:flex-start}.page-main{flex:1;min-width:0}
.page-sidebar{width:240px;flex-shrink:0;position:sticky;top:20px;max-height:calc(100vh - 40px);overflow-y:auto;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px}
.sidebar-title{font-family:var(--font-display);font-size:13px;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;padding:0 0 8px;border-bottom:0.5px solid var(--border);margin-bottom:6px}
.sidebar-team{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:6px;transition:background .15s;cursor:pointer}
.sidebar-team:hover{background:var(--bg3)}.sidebar-team.done{background:var(--gold-bg)}
.sidebar-flag{font-size:14px;flex-shrink:0;width:18px;text-align:center}
.sidebar-name{font-size:11px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text2)}
.sidebar-team.done .sidebar-name{color:var(--gold)}.sidebar-team.empty .sidebar-name{color:var(--text3)}
.sidebar-bar-wrap{width:32px;flex-shrink:0}.sidebar-bar-bg{background:var(--bg3);border-radius:99px;height:3px;overflow:hidden}
.sidebar-bar-fill{height:100%;border-radius:99px}.sidebar-pct{font-size:10px;font-weight:600;min-width:22px;text-align:right;color:var(--text3)}
.sidebar-team.done .sidebar-pct{color:var(--gold)}
@media(max-width:1100px){.page-sidebar{display:none}}
.bracket-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}.bracket-tab{font-size:12px;padding:5px 14px}
.bracket-tab.active{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue)}
.bracket-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.bracket-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:420px}
.bracket-match-label{font-size:10px;color:var(--text3);text-align:center;margin-bottom:2px}
.bracket-pair{display:flex;flex-direction:column;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .15s}
.bracket-pair:hover{border-color:var(--border2)}.bracket-pair.has-winner{border-color:var(--gold-bd)}
.bracket-pair.final-pair{border-color:var(--gold-bd);background:linear-gradient(135deg,var(--gold-bg),var(--bg2))}
.bracket-team{display:flex;align-items:center;gap:7px;padding:7px 10px;font-size:13px;font-weight:500;border-bottom:0.5px solid var(--border);min-height:34px}
.bracket-team:last-child{border-bottom:none}.bracket-team.winner{background:var(--gold-bg);color:var(--gold)}
.bracket-team.tbd{color:var(--text3);font-size:12px;font-style:italic}
.bracket-flag{font-size:15px;flex-shrink:0;width:20px;text-align:center}
.bracket-name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bracket-score{font-family:var(--font-display);font-size:14px;color:var(--text2);margin-left:4px}
.bracket-sf-wrap{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap}
.bracket-champion{text-align:center;padding:14px 20px;background:var(--gold-bg);border:0.5px solid var(--gold-bd);border-radius:var(--radius-lg);min-width:160px}
.bracket-trophy{font-size:32px;margin-bottom:6px}
.bracket-champ-label{font-family:var(--font-display);font-size:13px;letter-spacing:.06em;color:var(--gold);text-transform:uppercase;margin-bottom:4px}
.bracket-champ-name{font-size:15px;font-weight:600;color:var(--text)}
.bracket-qual-note{font-size:12px;color:var(--text3);margin-bottom:14px;padding:10px 14px;background:var(--bg2);border-radius:var(--radius);border:0.5px solid var(--border);line-height:1.6}
.trade-divider{margin:24px 0 0;border-top:0.5px solid var(--border);padding-top:20px}
.trade-section-title{font-family:var(--font-display);font-size:16px;letter-spacing:.06em;color:var(--text2);text-transform:uppercase;margin-bottom:12px}
.trade-mode-row{display:flex;gap:6px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.trade-mode-label{font-size:13px;color:var(--text3)}.trade-mode-btn{font-size:12px;padding:4px 12px}
.trade-mode-btn.active{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue)}
.trade-preview{background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px;font-family:monospace;font-size:12px;line-height:1.9;white-space:pre-wrap;color:var(--text2);max-height:320px;overflow-y:auto}
.trade-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.copy-success{color:var(--green);font-size:13px;font-weight:600;opacity:0;transition:opacity .3s}.copy-success.show{opacity:1}
.album-export-bar{display:flex;gap:8px;margin-bottom:14px}
</style>
</head>
<body>
<div class="wrap">
<div class="topbar">
  <div class="topbar-title">&#x26BD; <span>PANINI</span> WC 2026</div>
  <div class="topbar-actions">
    <button id="theme-btn" onclick="toggleTheme()" style="font-size:16px;width:40px;padding:6px">☀️</button>
    <button onclick="showOpenPack()" class="btn-gold">+ Abrir sobre</button>
    <button onclick="exportData()">&#x2193; Exportar</button>
    <button onclick="document.getElementById('impFile').click()">&#x2191; Importar</button>
    <input type="file" id="impFile" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</div>
<div id="match-banner" class="hidden"></div>
<div class="metrics" id="metrics"></div>
<div class="prog-wrap">
  <div class="prog-info">
    <span class="prog-pct-label" id="prog-pct">0%</span>
    <span class="prog-cnt-label" id="prog-cnt">0 / 994</span>
  </div>
  <div class="prog-bg"><div class="prog-fill" id="prog" style="width:0%"></div></div>
</div>
<div class="tabs">
  <button class="tab active" onclick="setView('album',this)">&#x1F4CB; Album</button>
  <button class="tab" onclick="setView('calendar',this)">&#x1F4C5; Partidos</button>
  <button class="tab" onclick="setView('groups',this)">&#x1F3C6; Grupos</button>
  <button class="tab" onclick="setView('teams',this)">&#x1F6A9; Equipos</button>
  <button class="tab" onclick="setView('bracket',this)">&#x1F3D7; Bracket</button>
  <button class="tab" onclick="setView('dupes',this)">&#x1F501; Duplicados</button>
  <button class="tab" onclick="setView('sobres',this)">&#x1F4E6; Sobres</button>
</div>
<div class="page-layout">
  <div class="page-main">
    <div id="view-album">
      <div class="album-export-bar">
        <button onclick="exportHave()">&#x1F4C4; Exportar lo que tengo (.txt)</button>
      </div>
      <div class="search-row">
        <input type="text" placeholder="Buscar equipo o jugador..." id="search" oninput="renderAlbum()">
        <button onclick="collapseAll()" style="white-space:nowrap;flex-shrink:0">Colapsar todo</button>
      </div>
      <div id="album-content"></div>
    </div>
    <div id="view-calendar" style="display:none">
      <div class="cal-controls">
        <span class="tz-label">Zona horaria</span>
        <select id="tz-select" onchange="saveTz();renderCalendar()">
          <option value="America/Phoenix">Phoenix / Hermosillo (MST)</option>
          <option value="America/New_York">Eastern (ET)</option>
          <option value="America/Chicago">Central (CT)</option>
          <option value="America/Denver">Mountain (MT)</option>
          <option value="America/Los_Angeles">Pacific (PT)</option>
          <option value="America/Mexico_City">Ciudad de Mexico (CST)</option>
          <option value="Europe/Madrid">Madrid (CET)</option>
          <option value="UTC">UTC</option>
        </select>
      </div>
      <div class="filter-row">
        <span class="filter-label">Ver</span>
        <button class="filter-btn active" onclick="setCalFilter('all',this)">Todos</button>
        <button class="filter-btn" onclick="setCalFilter('today',this)">Hoy</button>
        <button class="filter-btn" onclick="setCalFilter('upcoming',this)">Proximos 3 dias</button>
        <button class="filter-btn" onclick="setCalFilter('watched',this)">Vistos</button>
        <button class="filter-btn" onclick="setCalFilter('scored',this)">Con resultado</button>
      </div>
      <div id="calendar-content"></div>
    </div>
    <div id="view-groups" style="display:none"><div id="groups-content"></div></div>
    <div id="view-teams" style="display:none"><div id="teams-content"></div></div>
    <div id="view-bracket" style="display:none"><div id="bracket-content"></div></div>
    <div id="view-dupes" style="display:none"><div id="dupes-content"></div></div>
    <div id="view-sobres" style="display:none"><div id="sobres-content"></div></div>
  </div>
  <div class="page-sidebar" id="sidebar"></div>
</div>
</div>
<div id="pack-modal" style="display:none" onclick="if(event.target===this)closePack()">
  <div class="modal-box">
    <div class="modal-title">Abrir sobre</div>
    <div class="pack-type-row">
      <button class="pack-type-btn active" id="pt-reg" onclick="setPackType('reg',this)">Regular (7 estampas)</button>
      <button class="pack-type-btn" id="pt-cc" onclick="setPackType('cc',this)">Coca-Cola (2+1)</button>
    </div>
    <div class="modal-sub" id="pack-sub">Escribe el codigo de cada estampa</div>
    <div id="pack-inputs"></div>
    <div class="pack-preview" id="pack-preview"></div>
    <div class="modal-actions">
      <button onclick="closePack()">Cancelar</button>
      <button class="btn-gold" onclick="confirmPack()">Confirmar y guardar</button>
    </div>
  </div>

// ── STATE ──
let state = {}, matchState = {}, packHistory = [], collapsed = {}, groupCollapsed = {},
    currentView = 'album', calFilter = 'all', packType = 'reg', historyLimit = 20;

function loadState() {
  try {
    const r = localStorage.getItem(STORAGE_KEY);
    if (r) { const d = JSON.parse(r); state = d.s||{}; matchState = d.m||{}; packHistory = d.h||[]; }
  } catch(e) {}
  // migrate older keys
  if (!Object.keys(state).length) {
    ['panini2026v3','panini2026v2','panini2026'].forEach(k => {
      try { const d = JSON.parse(localStorage.getItem(k)||''); if(d){ state=d.s||d; matchState=d.m||{}; packHistory=d.h||[]; } } catch(e) {}
    });
  }
  ALBUM.forEach(s => {
    if (!state[s.id]) state[s.id] = {};
    s.stickers.forEach(stk => { if (state[s.id][stk.code]===undefined) state[s.id][stk.code]=0; });
  });
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({s:state, m:matchState, h:packHistory})); } catch(e) {}
}
function saveTz() { try { localStorage.setItem('panini_tz', document.getElementById('tz-select').value); } catch(e) {} }
function loadTz() {
  try { const t = localStorage.getItem('panini_tz'); if (t) { const el=document.getElementById('tz-select'); if(el) el.value=t; } } catch(e) {}
}

// ── THEME ──
function initTheme() {
  const saved = localStorage.getItem('panini_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  updateThemeBtn(saved);
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('panini_theme', next);
  updateThemeBtn(next);
}
function updateThemeBtn(theme) {
  const btn = document.getElementById('theme-btn');
  if (btn) btn.title = theme === 'dark' ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro';
  const icon = document.getElementById('theme-icon');
  if (icon) icon.textContent = theme === 'dark' ? '☀️' : '🌙';
}

// ── STATS ──
function getStats() {
  let haveReg=0,haveCC=0,dupReg=0,dupCC=0;
  ALBUM.forEach(s => {
    const isCC = s.type === 'cc';
    s.stickers.forEach(stk => {
      const v = state[s.id]?.[stk.code]||0;
      if (isCC) { if(v>=1)haveCC++; if(v>=2)dupCC+=v-1; }
      else       { if(v>=1)haveReg++; if(v>=2)dupReg+=v-1; }
    });
  });
  return {haveReg,haveCC,dupReg,dupCC};
}
function calcSobres(mR,mC) {
  const cc=mC, from=cc*2, rem=Math.max(0,mR-from), reg=Math.ceil(rem/7);
  return {cc,reg,total:cc+reg};
}
function dupFactor(p) {
  if(p<.30)return 1.06; if(p<.50)return 1.15; if(p<.65)return 1.28;
  if(p<.75)return 1.45; if(p<.85)return 1.70; if(p<.92)return 2.10; return 2.80;
}
function warnText(p) {
  if(p<.30)return 'Casi todo lo que abras sera nuevo. Buen momento para comprar en volumen.';
  if(p<.65)return 'Los duplicados ya se sienten. Usa Panini Trade para intercambios.';
  if(p<.85)return 'Zona de dolor. Mas de 1 de cada 3 estampas sera repetida.';
  return 'Tramo final. Los intercambios son la unica forma racional de completar el album.';
}

// ── METRICS ──
function renderMetrics() {
  const {haveReg,haveCC,dupReg,dupCC} = getStats();
  const mR=TOTAL_REG-haveReg, mC=TOTAL_CC-haveCC;
  const tot=haveReg+haveCC, grand=TOTAL_REG+TOTAL_CC, p=tot/grand, ps=(p*100).toFixed(1);
  const {total:sMin} = calcSobres(mR,mC);
  const sReal = Math.round(sMin*dupFactor(p));
  const watched = MATCHES.filter(m=>matchState[m.id]?.watched).length;
  const predsTotal = MATCHES.filter(m=>matchState[m.id]?.pred).length;
  const correct = MATCHES.filter(m=>{
    const ms=matchState[m.id]; if(!ms?.pred||ms.h==null||ms.a==null)return false;
    const res=ms.h>ms.a?'H':ms.h<ms.a?'A':'D'; return ms.pred===res;
  }).length;
  document.getElementById('prog').style.width=ps+'%';
  document.getElementById('prog-pct').textContent=ps+'%';
  document.getElementById('prog-cnt').textContent=tot+' / '+grand;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="mlabel">Album</div><div class="mval">${ps}%</div><div class="msub">${tot} de ${grand}</div></div>
    <div class="metric"><div class="mlabel">Faltan reg.</div><div class="mval">${mR}</div><div class="msub">de ${TOTAL_REG}</div></div>
    <div class="metric"><div class="mlabel">Duplicados</div><div class="mval">${dupReg+dupCC}</div><div class="msub">${dupReg} reg / ${dupCC} CC</div></div>
    <div class="metric"><div class="mlabel">Sobres est.</div><div class="mval">${sReal}</div><div class="msub">~${Math.round((dupFactor(p)-1)*100)}% dups</div></div>
    <div class="metric"><div class="mlabel">Vistos</div><div class="mval">${watched}</div><div class="msub">de ${MATCHES.length} partidos</div></div>
    <div class="metric"><div class="mlabel">Predicciones</div><div class="mval">${predsTotal>0?correct+'/'+predsTotal:'—'}</div><div class="msub">${predsTotal>0?Math.round(correct/predsTotal*100)+'% aciertos':'sin picks'}</div></div>`;
}

function calcStandings() {
  const teams = {};
  Object.entries(GROUPS).forEach(([grp,codes])=>{
    codes.forEach(code=>{ teams[code]={code,grp,pj:0,g:0,e:0,p:0,gf:0,gc:0,pts:0}; });
  });
  MATCHES.forEach(m=>{
    const ms=matchState[m.id];
    if(!m.group||!m.homeCode||!m.awayCode||ms?.h==null||ms?.a==null)return;
    const h=parseInt(ms.h),a=parseInt(ms.a);
    if(isNaN(h)||isNaN(a))return;
    const ht=teams[m.homeCode],at=teams[m.awayCode];
    if(!ht||!at)return;
    ht.pj++;at.pj++;ht.gf+=h;ht.gc+=a;at.gf+=a;at.gc+=h;
    if(h>a){ht.g++;ht.pts+=3;at.p++;}
    else if(h<a){at.g++;at.pts+=3;ht.p++;}
    else{ht.e++;at.e++;ht.pts++;at.pts++;}
  });
  Object.values(teams).forEach(t=>t.dif=t.gf-t.gc);
  return teams;
}

function renderGroups() {
  const teams = calcStandings();
  let html = '<div class="groups-grid">';
  Object.entries(GROUPS).forEach(([grp,codes])=>{
    const rows = codes.map(c=>teams[c]).sort((a,b)=>b.pts-a.pts||b.dif-a.dif||b.gf-a.gf||a.code.localeCompare(b.code));
    html+=`<div class="group-card">
      <div class="group-card-title"><span class="group-badge">${grp}</span> Grupo ${grp}</div>
      <table class="standings-table">
        <thead><tr><th>Equipo</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>GF</th><th>GC</th><th>DIF</th><th>PTS</th></tr></thead>
        <tbody>`;
    rows.forEach((t,i)=>{
      const cls=i===0?'qualify-1st':i===1?'qualify-2nd':'';
      const pos=i===0?'①':i===1?'②':'';
      const difColor=t.dif>0?'var(--green)':t.dif<0?'var(--red)':'var(--text3)';
      html+=`<tr class="${cls}">
        <td><div class="team-cell"><span style="font-size:18px">${FLAGS[t.code]||''}</span>${TEAM_NAMES[t.code]||t.code} <span style="font-size:10px;color:var(--green)">${pos}</span></div></td>
        <td>${t.pj}</td><td>${t.g}</td><td>${t.e}</td><td>${t.p}</td>
        <td>${t.gf}</td><td>${t.gc}</td>
        <td style="color:${difColor}">${t.dif>0?'+':''}${t.dif}</td>
        <td class="pts-cell">${t.pts}</td>
      </tr>`;
    });
    html+=`</tbody></table>
      <div class="qual-legend">
        <span><span class="qual-dot" style="background:var(--green)"></span>Top 2 clasifican</span>
      </div></div>`;
  });
  html+='</div>';
  document.getElementById('groups-content').innerHTML=html;
}

// ── DYNAMIC ODDS ──
function getDynamicOdds(matchId, match) {
  if(!match.group||!match.homeCode||!match.awayCode)return null;
  const teams=calcStandings();
  const ht=teams[match.homeCode],at=teams[match.awayCode];
  if(!ht||!at)return OPTA_ODDS[matchId]||null;
  if(ht.pj===0&&at.pj===0)return OPTA_ODDS[matchId]||null;
  const base=OPTA_ODDS[matchId]||[33,34,33];
  const ptsDiff=ht.pts-at.pts, gifDiff=ht.dif-at.dif;
  const shift=Math.min(18,Math.abs(ptsDiff)*5+Math.abs(gifDiff)*2);
  let [h,d,a]=base;
  if(ptsDiff>0||(ptsDiff===0&&gifDiff>0)){h+=shift;a-=shift;}
  else if(ptsDiff<0||(ptsDiff===0&&gifDiff<0)){a+=shift;h-=shift;}
  h=Math.max(5,Math.min(90,h)); a=Math.max(5,Math.min(90,a)); d=Math.max(8,100-h-a);
  const tot=h+d+a;
  return[Math.round(h/tot*100),Math.round(d/tot*100),Math.round(a/tot*100)];
}

// ── CALENDAR ──
function getTz(){return document.getElementById('tz-select')?.value||'America/Phoenix';}
function fmtTime(utc,tz){return new Date(utc).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',timeZone:tz,hour12:true});}
function fmtDate(utc,tz){return new Date(utc).toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',timeZone:tz});}
function dateKey(utc,tz){return new Date(utc).toLocaleDateString('en-CA',{timeZone:tz});}
function isToday(utc,tz){return dateKey(utc,tz)===new Date().toLocaleDateString('en-CA',{timeZone:tz});}
function withinDays(utc,days,tz){const diff=(new Date(utc)-new Date())/86400000;return diff>=-1&&diff<=days;}

function setCalFilter(f,btn){
  calFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); renderCalendar();
}

function renderCalendar() {
  const tz=getTz(), now=new Date();
  let matches=MATCHES;
  if(calFilter==='today')    matches=MATCHES.filter(m=>isToday(m.date,tz));
  else if(calFilter==='upcoming')matches=MATCHES.filter(m=>withinDays(m.date,3,tz));
  else if(calFilter==='watched')matches=MATCHES.filter(m=>matchState[m.id]?.watched);
  else if(calFilter==='scored')matches=MATCHES.filter(m=>matchState[m.id]?.h!=null);

  if(!matches.length){
    document.getElementById('calendar-content').innerHTML='<div class="empty">Sin partidos para este filtro</div>';
    return;
  }
  const byDate={};
  matches.forEach(m=>{const dk=dateKey(m.date,tz);if(!byDate[dk])byDate[dk]=[];byDate[dk].push(m);});

  let html='';
  Object.keys(byDate).sort().forEach(dk=>{
    const dayMs=byDate[dk], isT=isToday(dayMs[0].date,tz);
    const dl=fmtDate(dayMs[0].date,tz);
    html+=`<div class="date-group">
      <div class="date-heading">
        ${dl.charAt(0).toUpperCase()+dl.slice(1)}
        ${isT?'<span class="date-today-pill">Hoy</span>':''}
      </div>`;

    dayMs.forEach(m=>{
      const ms=matchState[m.id]||{};
      const hScore=ms.h!=null?ms.h:'', aScore=ms.a!=null?ms.a:'';
      const isLive=new Date(m.date)<=now&&(now-new Date(m.date))<7200000;
      const isPast=new Date(m.date)<now;
      const odds=getDynamicOdds(m.id,m);
      const mapUrl=VENUE_MAPS[m.venue]||`https://maps.google.com/?q=${encodeURIComponent(m.venue)}`;
      const isGroup=!!m.group;
      const stageCls=isGroup?'stage-group':'stage-knockout';
      const stageLabel=isGroup?`Gr. ${m.group}`:m.stage;

      // Prediction
      let predHTML='';
      if(odds){
        const pH=ms.pred==='H'?'selected':'', pD=ms.pred==='D'?'selected':'', pA=ms.pred==='A'?'selected':'';
        let resultHTML='';
        if(ms.pred&&ms.h!=null&&ms.a!=null){
          const actual=ms.h>ms.a?'H':ms.h<ms.a?'A':'D';
          resultHTML=ms.pred===actual
            ?'<div class="pred-outcome correct">✓ Acertaste</div>'
            :'<div class="pred-outcome wrong">✗ Fallaste</div>';
        }
        predHTML=`<div class="pred-row">
          <button class="pred-btn pred-home ${pH}" onclick="setPred(${m.id},'H')">
            <span class="pred-pct">${odds[0]}%</span><span class="pred-label">Local</span>
          </button>
          <button class="pred-btn pred-draw ${pD}" onclick="setPred(${m.id},'D')">
            <span class="pred-pct">${odds[1]}%</span><span class="pred-label">Empate</span>
          </button>
          <button class="pred-btn pred-away ${pA}" onclick="setPred(${m.id},'A')">
            <span class="pred-pct">${odds[2]}%</span><span class="pred-label">Visitante</span>
          </button>
        </div>${resultHTML}`;
      }

      html+=`<div class="match-card ${isLive?'live':''} ${isPast&&!isLive?'finished':''}">
        <div class="match-time-col">
          <div class="match-time ${isLive?'live-indicator':''}">${isLive?'🔴 EN VIVO':fmtTime(m.date,tz)}</div>
          <span class="match-stage-label ${stageCls}">${stageLabel}</span>
        </div>
        <div class="match-body">
          <div class="match-team-row">
            <span class="match-team-label">Local</span>
            ${m.homeCode?`<span style="font-size:20px">${FLAGS[m.homeCode]||''}</span>`:''}
            <span class="match-team-name">${m.home}</span>
          </div>
          <div class="match-divider"></div>
          <div class="match-team-row">
            <span class="match-team-label">Visita</span>
            ${m.awayCode?`<span style="font-size:20px">${FLAGS[m.awayCode]||''}</span>`:''}
            <span class="match-team-name">${m.away}</span>
          </div>
          <div class="match-venue-row">
            <a class="match-venue-link" href="${mapUrl}" target="_blank" rel="noopener">
              📍 ${m.venue} ↗
            </a>
          </div>
          ${predHTML}
        </div>
        <div class="match-right">
          <div class="match-score">
            <div class="score-box">
              <input type="tel" inputmode="numeric" pattern="[0-9]*" class="score-input" value="${hScore}" placeholder="–"
                oninput="setScore(${m.id},'h',this.value)" onclick="this.select()">
              <input type="tel" inputmode="numeric" pattern="[0-9]*" class="score-input" value="${aScore}" placeholder="–"
                oninput="setScore(${m.id},'a',this.value)" onclick="this.select()">
            </div>
          </div>
          <button class="match-watched ${ms.watched?'watched-yes':''}" onclick="toggleWatched(${m.id})">
            ${ms.watched?'👁 Visto':'👁 Ver'}
          </button>
        </div>
      </div>`;
    });
    html+='</div>';
  });
  document.getElementById('calendar-content').innerHTML=html;
}

function setScore(id,side,val){
  if(!matchState[id])matchState[id]={};
  const n=parseInt(val); matchState[id][side]=(isNaN(n)||val==='')?null:n;
  saveState();renderMetrics();
}
function setPred(id,pick){
  if(!matchState[id])matchState[id]={};
  matchState[id].pred=matchState[id].pred===pick?null:pick;
  saveState();renderMetrics();renderCalendar();
}
function toggleWatched(id){
  if(!matchState[id])matchState[id]={};
  matchState[id].watched=!matchState[id].watched;
  saveState();renderMetrics();renderCalendar();
}

// ── ALBUM ──
function secHave(id){
  const s=ALBUM.find(x=>x.id===id);
  return s.stickers.filter(stk=>(state[id]?.[stk.code]||0)>=1).length;
}
function bcls(h,t){return h===0?'b-none':h===t?'b-done':'b-part';}
function btxt(h,t){return h===0?'vacio':h===t?'completo':h+'/'+t;}

function toggleGroup(gKey){
  groupCollapsed[gKey]=!groupCollapsed[gKey];
  renderAlbum();
}

function renderAlbum(){
  const q=(document.getElementById('search')?.value||'').toLowerCase().trim();
  const ORDER=['special','A','B','C','D','E','F','G','H','I','J','K','L'];
  const grouped={};
  ALBUM.forEach(s=>{const k=s.group||'special';if(!grouped[k])grouped[k]=[];grouped[k].push(s);});
  let html='';
  ORDER.forEach(gKey=>{
    const secs=grouped[gKey]; if(!secs)return;
    const filtered=secs.filter(s=>{
      if(!q)return true;
      if(s.name.toLowerCase().includes(q)||s.id.toLowerCase().includes(q))return true;
      return s.stickers.some(stk=>stk.code.toLowerCase().includes(q)||stk.name.toLowerCase().includes(q));
    });
    if(!filtered.length)return;

    const isSpecial=gKey==='special';
    const gLabel=isSpecial?'Secciones especiales':'Grupo '+gKey;
    const gOpen=groupCollapsed[gKey]===false?false:true; // default open
    const gChevCls=gOpen?'open':'';

    html+=`<div class="group-block">
      <div class="group-title ${gOpen?'open':''}" onclick="toggleGroup('${gKey}')">
        ${!isSpecial?`<span class="group-badge">${gKey}</span>`:''}
        <span class="group-title-text">${gLabel}</span>
        <span class="group-chev ${gChevCls}">▼</span>
      </div>`;

    if(gOpen){
      html+=`<div class="group-body">`;
      filtered.forEach(s=>{
        const have=secHave(s.id), total=s.stickers.length, open=!collapsed[s.id];
        const isDone=have===total&&total>0;
        const pct=total>0?Math.round(have/total*100):0;
        html+=`<div class="sec-card ${isDone?'complete':''}" id="sec-${s.id}">
          <div class="sec-header" onclick="toggleSec('${s.id}')">
            <span class="sec-name">${s.flag?`<span style="font-size:20px">${s.flag}</span>`:''} ${s.name}${isDone?' ✦':''}</span>
            <div class="sec-prog-wrap">
              <div class="sec-prog-bg"><div class="sec-prog-fill" style="width:${pct}%"></div></div>
            </div>
            <span class="sec-meta">
              <span class="badge ${bcls(have,total)}">${btxt(have,total)}</span>
              <span class="chev ${open?'open':''}">▼</span>
            </span>
          </div>`;
        if(open){
          html+=`<div class="sec-body">
            <div class="sec-actions">
              <button onclick="markAll('${s.id}',1)">Marcar todas</button>
              <button onclick="markAll('${s.id}',0)">Limpiar</button>
            </div>
            <div class="stk-grid" id="grid-${s.id}">`;
          s.stickers.forEach(stk=>{
            const v=state[s.id]?.[stk.code]||0;
            const cls=v===0?'':(v===1?'have':'dup');
            const hl=q&&(stk.code.toLowerCase().includes(q)||stk.name.toLowerCase().includes(q))
              ?'outline:2px solid var(--amber-bd);outline-offset:1px;':'';
            const minusBadge=v>=2?`<div class="stk-minus" title="Quitar uno">−</div>`:'';
            html+=`<div class="stk-wrap" data-sid="${s.id}" data-code="${stk.code}">
              <div class="stk ${cls}" style="${hl}" title="${v===0?'Falta':v===1?'Tengo':v+' copias'}">
                <span class="stk-code">${stk.code}</span>
                <span class="stk-name">${stk.name}</span>
                ${v>=2?`<span class="stk-count">×${v}</span>`:''}
              </div>
              ${minusBadge}
            </div>`;
          });
          html+='</div></div>';
        }
        html+='</div>';
      });
      html+=`</div>`;
    }
    html+='</div>';
  });
  document.getElementById('album-content').innerHTML=html||'<div class="empty">Sin resultados</div>';
  // Delegated listener for sticker clicks — works in all browsers without inline onclick
  const ac = document.getElementById('album-content');
  ac.onclick = function(e) {
    const wrap = e.target.closest('.stk-wrap');
    if (!wrap) return;
    const sid = wrap.dataset.sid, code = wrap.dataset.code;
    if (!sid || !code) return;
    const isMinus = e.target.classList.contains('stk-minus') || e.target.classList.contains('stk-count');
    cycle(sid, code, isMinus);
  };
}

// ── DUPES ──
function renderDupes(){
  const {dupReg,dupCC}=getStats();
  if(dupReg+dupCC===0){document.getElementById('dupes-content').innerHTML='<div class="empty">Sin duplicados todavia</div>';return;}
  let html='';
  ALBUM.forEach(s=>{
    let items='';
    s.stickers.forEach(stk=>{
      const v=state[s.id]?.[stk.code]||0;
      if(v>=2){
        const sobrantes=v-1;
        items+=`<div class="dup-item">
          <div class="dup-l">
            ${s.flag?`<span style="font-size:18px;flex-shrink:0">${s.flag}</span>`:''}
            <div class="dup-l-text">
              <span class="dup-l-code">${stk.code}</span>
              <span class="dup-l-name">${stk.name}</span>
            </div>
          </div>
          <div class="dup-r">
            <button class="dup-btn dup-minus" onclick="cycle('${s.id}','${stk.code}',true)" title="Quitar uno">−</button>
            <div class="dup-counter">
              <div>
                <div class="dup-count-val">${sobrantes}</div>
                <div class="dup-count-label">sobra${sobrantes!==1?'n':''}</div>
              </div>
            </div>
            <button class="dup-btn dup-plus" onclick="cycle('${s.id}','${stk.code}',false)" title="Agregar uno">+</button>
          </div>
        </div>`;
      }
    });
    if(items)html+=`<div class="sec-card" style="border-radius:var(--radius-lg);border:0.5px solid var(--border);margin-bottom:8px">
      <div class="sec-header" style="cursor:default;border-radius:var(--radius-lg)">
        <span class="sec-name">
          ${s.flag?`<span style="font-size:20px">${s.flag}</span>`:''}
          ${s.name}
          ${s.group?`<span class="group-badge" style="font-size:10px">Gr.${s.group}</span>`:''}
        </span>
      </div>
      <div class="dup-list">${items}</div>
    </div>`;
  });
  html += buildTradeSection();
  document.getElementById('dupes-content').innerHTML=html;
  updateTradePreview();
}

function renderSobres(){
  const {haveReg,haveCC}=getStats();
  const mR=TOTAL_REG-haveReg,mC=TOTAL_CC-haveCC,p=(haveReg+haveCC)/(TOTAL_REG+TOTAL_CC);
  const {cc,reg,total}=calcSobres(mR,mC);
  const f=dupFactor(p),real=Math.round(total*f),dp=Math.round((f-1)*100);
  const totalPacks=packHistory.length;
  const totalOpened=packHistory.reduce((a,e)=>a+(e.codes.length),0);
  document.getElementById('sobres-content').innerHTML=`
    <div class="info-card">
      <div class="info-grid">
        <div class="metric"><div class="mlabel">Sobres CC</div><div class="mval">${cc}</div><div class="msub">dan ${cc*2} reg de bonus</div></div>
        <div class="metric"><div class="mlabel">Sobres reg.</div><div class="mval">${reg}</div><div class="msub">7 estampas c/u</div></div>
        <div class="metric"><div class="mlabel">Total minimo</div><div class="mval">${total}</div><div class="msub">sin duplicados</div></div>
        <div class="metric"><div class="mlabel">Estimado real</div><div class="mval">${p>=.999?'Listo!':real}</div><div class="msub">~${dp}% dups esperados</div></div>
        <div class="metric"><div class="mlabel">Sobres abiertos</div><div class="mval">${totalPacks}</div><div class="msub">${totalOpened} estampas recibidas</div></div>
      </div>
      <div class="warn-box">${warnText(p)}</div>
      <p class="info-note" style="margin-bottom:14px">Completado: ${(p*100).toFixed(1)}% · Faltan ${mR} regulares y ${mC} CC</p>
      <div class="export-txt-row">
        <button onclick="exportMissing()">📄 Exportar faltantes (.txt)</button>
        <button onclick="exportDuplicates()">📄 Exportar duplicados (.txt)</button>
      </div>
    </div>
    <div class="history-section">
      <div class="history-title">Historial de sobres</div>
      <div id="pack-history"></div>
    </div>`;
  renderPackHistory();
}

  document.getElementById('pt-cc').classList.remove('active');
  buildPackInputs();
}
function closePack(){document.getElementById('pack-modal').style.display='none';}
function buildPackInputs(){
  const count=packType==='reg'?7:3;
  const labels=packType==='reg'?['1','2','3','4','5','6','7']:['Regular 1','Regular 2','Coca-Cola'];
  document.getElementById('pack-sub').textContent=packType==='reg'
    ?'Escribe el codigo de cada estampa (ej: MEX5, ARG12, FWC3)'
    :'2 estampas regulares y 1 Coca-Cola (ej: CC7)';
  let html='<div class="pack-inputs-grid">';
  for(let i=0;i<count;i++){
    html+=`<div class="pack-input-wrap">
      <div class="pack-input-label">Estampa ${labels[i]}</div>
      <input type="text" class="pack-stk-input" id="pi-${i}"
        placeholder="${i===count-1&&packType==='cc'?'CC1-CC14':'MEX1...'}"
        oninput="previewPack()" autocomplete="off" autocorrect="off" autocapitalize="characters">
    </div>`;
  }
  html+='</div>';
  document.getElementById('pack-inputs').innerHTML=html;
  document.getElementById('pack-preview').innerHTML='<div style="color:var(--text3)">Los resultados apareceran aqui...</div>';
  document.getElementById('pi-0').focus();
}

const STICKER_LOOKUP=(()=>{
  const map={};
  ALBUM.forEach(s=>s.stickers.forEach(stk=>map[stk.code.toUpperCase()]={secId:s.id,stk}));
  return map;
})();

function previewPack(){
  const count=packType==='reg'?7:3;
  let html='';
  for(let i=0;i<count;i++){
    const el=document.getElementById('pi-'+i);
    const raw=(el.value||'').trim().toUpperCase();
    if(!raw){el.className='pack-stk-input';continue;}
    const found=STICKER_LOOKUP[raw];
    if(!found){el.className='pack-stk-input invalid';html+=`<span class="preview-inv">✗ ${raw} — no encontrado</span><br>`;}
    else{
      const cur=state[found.secId]?.[raw]||0;
      if(cur>=1){el.className='pack-stk-input dup-found';html+=`<span class="preview-dup">⚡ ${raw} — ${found.stk.name} (dup #${cur+1})</span><br>`;}
      else{el.className='pack-stk-input valid';html+=`<span class="preview-new">✓ ${raw} — ${found.stk.name}</span><br>`;}
    }
  }
  document.getElementById('pack-preview').innerHTML=html||'<span style="color:var(--text3)">Escribe los codigos arriba...</span>';
}

function confirmPack(){
  const count=packType==='reg'?7:3;
  let saved=0,dups=0;
  const codes=[];
  for(let i=0;i<count;i++){
    const raw=(document.getElementById('pi-'+i)?.value||'').trim().toUpperCase();
    if(!raw)continue;
    const found=STICKER_LOOKUP[raw]; if(!found)continue;
    codes.push(raw);
    const cur=state[found.secId]?.[raw]||0;
    state[found.secId][raw]=cur+1;
    if(cur>=1)dups++; else saved++;
  }
  // Save to history
  if(codes.length>0){
    packHistory.unshift({
      date: new Date().toISOString(),
      type: packType,
      codes,
      newCount: saved,
      dupCount: dups
    });
    if(packHistory.length>200) packHistory.pop(); // cap at 200
  }
  saveState(); closePack(); refresh();
  const t=document.createElement('div');
  t.className='toast';
  t.textContent=`✓ ${saved} nuevas · ${dups} duplicados`;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2800);
}

function cycle(sid,code,dec){

// ── MATCH BANNER ──
function updateMatchBanner(){
  const tz=getTz();
  const now=new Date();
  const banner=document.getElementById('match-banner');
  if(!banner)return;

  // Find live match first
  const live=MATCHES.find(m=>{
    const start=new Date(m.date);
    return start<=now&&(now-start)<7200000&&m.homeCode;
  });
  if(live){
    banner.classList.remove('hidden');
    banner.innerHTML=`<div class="banner-dot"></div>
      <div>
        <div class="banner-text">EN VIVO: ${FLAGS[live.homeCode]||''} ${live.home} vs ${FLAGS[live.awayCode]||''} ${live.away}</div>
        <div class="banner-sub">${live.venue}</div>
      </div>
      <button class="banner-go btn-gold" onclick="setView('calendar',document.querySelector('.tab:nth-child(2)'))">Ver partido</button>`;
    // Badge on tab
    updateLiveTab(true);
    return;
  }

  // Find next upcoming (within 2hrs)
  const upcoming=MATCHES.filter(m=>{
    const diff=(new Date(m.date)-now)/60000;
    return diff>0&&diff<=120&&m.homeCode;
  }).sort((a,b)=>new Date(a.date)-new Date(b.date))[0];

  if(upcoming){
    const diff=Math.round((new Date(upcoming.date)-now)/60000);
    banner.classList.remove('hidden');
    banner.innerHTML=`<div class="banner-dot" style="background:var(--gold)"></div>
      <div>
        <div class="banner-text">Próximo partido en ${diff} min: ${FLAGS[upcoming.homeCode]||''} ${upcoming.home} vs ${FLAGS[upcoming.awayCode]||''} ${upcoming.away}</div>
        <div class="banner-sub">${fmtTime(upcoming.date,tz)} · ${upcoming.venue}</div>
      </div>
      <button class="banner-go btn-gold" onclick="setView('calendar',document.querySelector('.tab:nth-child(2)'))">Ver</button>`;
    updateLiveTab(false);
    return;
  }

  banner.classList.add('hidden');
  updateLiveTab(false);
}

function updateLiveTab(isLive){
  const calTab=document.querySelector('.tab:nth-child(2)');
  if(!calTab)return;
  const existing=calTab.querySelector('.tab-live-dot');
  if(isLive&&!existing){
    const dot=document.createElement('span');
    dot.className='tab-live-dot';
    calTab.appendChild(dot);
  } else if(!isLive&&existing){
    existing.remove();
  }
}

// ── BRACKET ──
let bracketRound = 'r32';

function getClassified() {
  // Returns {code, name, flag, group, pts, dif, gf} sorted per group
  const teams = calcStandings();
  const classified = {};
  Object.entries(GROUPS).forEach(([grp, codes]) => {
    const sorted = codes.map(c => teams[c]).sort((a,b) =>
      b.pts-a.pts || b.dif-a.dif || b.gf-a.gf || a.code.localeCompare(b.code)
    );
    classified[grp] = sorted;
  });
  return classified;
}

function teamBox(code, name, isWinner, score) {
  const flag = code ? (FLAGS[code]||'') : '';
  const displayName = code ? (TEAM_NAMES[code]||name||code) : (name||'Por definir');
  const cls = !code && !name ? 'tbd' : (isWinner ? 'winner' : '');
  const scoreHtml = score != null ? `<span class="bracket-score">${score}</span>` : '';
  return `<div class="bracket-team ${cls}">
    <span class="bracket-flag">${flag}</span>
    <span class="bracket-name">${displayName}</span>
    ${scoreHtml}
  </div>`;
}

function renderBracket() {
  const cl = getClassified();

  // Get 1st and 2nd from each group (or null if not enough results)
  function first(grp) { const t=cl[grp]?.[0]; return t?.pj>0?t:null; }
  function second(grp) { const t=cl[grp]?.[1]; return t?.pj>0?t:null; }

  // Best 3rd: top 8 third-placed teams by pts/dif/gf
  const thirds = Object.values(cl).map(g=>g[2]).filter(t=>t&&t.pj>0)
    .sort((a,b)=>b.pts-a.pts||b.dif-a.dif||b.gf-a.gf).slice(0,8);

  // R32 pairings (official FIFA bracket)
  const R32 = [
    {id:73, h:second('A'), a:second('B')},
    {id:74, h:first('C'),  a:second('F')},
    {id:75, h:first('E'),  a:thirds[0]||null},
    {id:76, h:first('F'),  a:second('C')},
    {id:77, h:second('E'), a:second('I')},
    {id:78, h:first('I'),  a:thirds[1]||null},
    {id:79, h:first('A'),  a:thirds[2]||null},
    {id:80, h:first('L'),  a:thirds[3]||null},
    {id:81, h:first('G'),  a:thirds[4]||null},
    {id:82, h:first('D'),  a:thirds[5]||null},
    {id:83, h:first('H'),  a:second('J')},
    {id:84, h:second('K'), a:second('L')},
    {id:85, h:first('B'),  a:thirds[6]||null},
    {id:86, h:second('D'), a:second('G')},
    {id:87, h:first('J'),  a:second('H')},
    {id:88, h:first('K'),  a:thirds[7]||null},
  ];

  function getWinner(matchId, homeTeam, awayTeam) {
    const ms = matchState[matchId];
    if (!ms || ms.h == null || ms.a == null) return null;
    if (parseInt(ms.h) > parseInt(ms.a)) return homeTeam;
    if (parseInt(ms.h) < parseInt(ms.a)) return awayTeam;
    return null; // draw — in KO should not happen, show both
  }

  function matchPair(matchId, home, away, isFinal) {
    const ms = matchState[matchId]||{};
    const hScore = ms.h != null ? ms.h : null;
    const aScore = ms.a != null ? ms.a : null;
    const winner = getWinner(matchId, home, away);
    const hWin = winner && home && winner.code === home.code;
    const aWin = winner && away && winner.code === away.code;
    return `<div class="bracket-pair${winner?' has-winner':''}${isFinal?' bracket-final-pair':''}">
      ${teamBox(home?.code, home?null:'Por definir', hWin, hScore)}
      ${teamBox(away?.code, away?null:'Por definir', aWin, aScore)}
    </div>`;
  }

  // Build R32 winners for R16
  const R32W = R32.map(m => getWinner(m.id, m.h, m.a));
  // R16 pairings
  const R16 = [
    {id:89,  h:R32W[0], a:R32W[3]},
    {id:90,  h:R32W[1], a:R32W[4]},
    {id:91,  h:R32W[2], a:R32W[5]},
    {id:92,  h:R32W[6], a:R32W[7]},
    {id:93,  h:R32W[10], a:R32W[11]},
    {id:94,  h:R32W[8],  a:R32W[9]},
    {id:95,  h:R32W[12], a:R32W[15]},
    {id:96,  h:R32W[13], a:R32W[14]},
  ];
  const R16W = R16.map(m => getWinner(m.id, m.h, m.a));
  // QF
  const QF = [
    {id:97,  h:R16W[0], a:R16W[1]},
    {id:98,  h:R16W[4], a:R16W[5]},
    {id:99,  h:R16W[2], a:R16W[3]},
    {id:100, h:R16W[6], a:R16W[7]},
  ];
  const QFW = QF.map(m => getWinner(m.id, m.h, m.a));
  // SF
  const SF = [
    {id:101, h:QFW[0], a:QFW[1]},
    {id:102, h:QFW[2], a:QFW[3]},
  ];
  const SFW = SF.map(m => getWinner(m.id, m.h, m.a));
  // Final
  const FIN = {id:104, h:SFW[0], a:SFW[1]};
  const champion = getWinner(FIN.id, FIN.h, FIN.a);

  // Render chosen round
  let html = `<div class="bracket-tabs">
    <button class="bracket-tab ${bracketRound==='r32'?'active':''}" onclick="bracketRound='r32';renderBracket()">Ronda 32</button>
    <button class="bracket-tab ${bracketRound==='r16'?'active':''}" onclick="bracketRound='r16';renderBracket()">Octavos</button>
    <button class="bracket-tab ${bracketRound==='qf'?'active':''}" onclick="bracketRound='qf';renderBracket()">Cuartos</button>
    <button class="bracket-tab ${bracketRound==='sf'?'active':''}" onclick="bracketRound='sf';renderBracket()">Semis + Final</button>
  </div>`;

  if (bracketRound === 'r32') {
    html += `<div class="group-qual-note">Los equipos clasificados se llenan automaticamente con los resultados que metas en Partidos. Los <em>mejores terceros</em> se determinan al terminar la fase de grupos.</div>`;
    html += '<div class="bracket-wrap"><div class="bracket" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;min-width:auto">';
    R32.forEach((m,i) => {
      const ms = matchState[m.id]||{};
      html += `<div style="display:flex;flex-direction:column;gap:4px">
        <div style="font-size:10px;color:var(--text3);text-align:center;margin-bottom:2px">Partido ${i+1}</div>
        ${matchPair(m.id, m.h, m.a, false)}
      </div>`;
    });
    html += '</div></div>';
  }

  else if (bracketRound === 'r16') {
    html += '<div class="bracket-wrap"><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">';
    R16.forEach((m,i) => {
      html += `<div style="display:flex;flex-direction:column;gap:4px">
        <div style="font-size:10px;color:var(--text3);text-align:center;margin-bottom:2px">Partido ${i+1}</div>
        ${matchPair(m.id, m.h, m.a, false)}
      </div>`;
    });
    html += '</div></div>';
  }

  else if (bracketRound === 'qf') {
    html += '<div class="bracket-wrap"><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:420px">';
    QF.forEach((m,i) => {
      html += `<div>
        <div style="font-size:10px;color:var(--text3);text-align:center;margin-bottom:4px">Cuarto ${i+1}</div>
        ${matchPair(m.id, m.h, m.a, false)}
      </div>`;
    });
    html += '</div></div>';
  }

  else if (bracketRound === 'sf') {
    html += '<div class="bracket-wrap"><div style="display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap">';
    // Semis
    html += '<div style="display:flex;flex-direction:column;gap:10px">';
    html += '<div style="font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Semifinales</div>';
    SF.forEach((m,i) => {
      html += `<div>
        <div style="font-size:10px;color:var(--text3);margin-bottom:4px">Semi ${i+1}</div>
        ${matchPair(m.id, m.h, m.a, false)}
      </div>`;
    });
    html += '</div>';
    // Final
    html += `<div>
      <div style="font-size:12px;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;font-family:var(--font-display)">⭐ Final</div>
      ${matchPair(FIN.id, FIN.h, FIN.a, true)}
    </div>`;
    // Champion
    if (champion) {
      html += `<div class="bracket-champion">
        <div class="bracket-trophy">🏆</div>
        <div class="bracket-champion-flag">${FLAGS[champion.code]||''}</div>
        <div class="bracket-champion-title">Campeón</div>
        <div class="bracket-champion-name">${TEAM_NAMES[champion.code]||champion.code}</div>
      </div>`;
    }
    html += '</div></div>';
  }

  document.getElementById('bracket-content').innerHTML = html;
}

let tradeMode = 'compact';

function renderTrade() {
  document.getElementById('trade-content').innerHTML = `
